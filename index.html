<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zoner Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=ocean2">
</head>
<body>
  <main class="viz-app" aria-label="Zoner polygon fish visualizer">
    <canvas id="visualizer" width="1600" height="900" aria-label="Audio reactive fish visualizer"></canvas>

    <section class="control-dock" aria-label="Visualizer controls">
      <div class="source-buttons" role="group" aria-label="Audio source">
        <button id="viz-demo" class="dock-btn is-active" type="button">DEMO</button>
        <button id="viz-tab" class="dock-btn" type="button">TAB</button>
        <button id="viz-mic" class="dock-btn" type="button">MIC</button>
        <button id="viz-file-btn" class="dock-btn" type="button">FILE</button>
        <input id="viz-file" type="file" accept="audio/*" hidden>
      </div>

      <div class="dock-readout" aria-live="polite">
        <span id="viz-status">DEMO</span>
        <span id="viz-stage">STAGE 1</span>
        <span id="viz-time">00:00</span>
      </div>
    </section>

    <audio id="viz-audio" preload="metadata" hidden></audio>
  </main>

  <script src="script.js?v=ocean2"></script>
</body>
</html>
